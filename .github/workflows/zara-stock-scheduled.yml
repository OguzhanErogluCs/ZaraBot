name: Zara stock scheduled

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - zara_stock_check

permissions:
  contents: read
  actions: write

concurrency:
  group: zara-stock-scheduled
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_PATH: data/zarabot.sqlite3
      POLL_INTERVAL_SECONDS: 300
      PLAYWRIGHT_BROWSERS_PATH: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore stock state
        uses: actions/cache/restore@v4
        with:
          path: data
          key: zarabot-state-${{ github.run_id }}
          restore-keys: |
            zarabot-state-

      - name: Validate secrets
        run: |
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "Missing TELEGRAM_BOT_TOKEN repository secret" && exit 1)
          test -n "$TELEGRAM_CHAT_ID" || (echo "Missing TELEGRAM_CHAT_ID repository secret" && exit 1)

      - name: Check stock once
        run: xvfb-run -a python -m zarabot --products products.txt --once --headed --fail-on-unknown

      - name: Save stock state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: zarabot-state-${{ github.run_id }}
