name: Zara stock check

on:
  workflow_dispatch:
    inputs:
      notify_current:
        description: "Send a Telegram notification for products that are currently in stock"
        required: false
        default: false
        type: boolean
      seed_out_of_stock_url:
        description: "Optional test URL to mark as out_of_stock before checking"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "7/5 * * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: zara-stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_PATH: data/zarabot.sqlite3
      POLL_INTERVAL_SECONDS: 300
      PLAYWRIGHT_BROWSERS_PATH: "0"
      NOTIFY_CURRENT: ${{ github.event_name == 'workflow_dispatch' && inputs.notify_current }}
      SEED_OUT_OF_STOCK_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_out_of_stock_url || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore stock state
        uses: actions/cache/restore@v4
        with:
          path: data
          key: zarabot-state-${{ github.run_id }}
          restore-keys: |
            zarabot-state-

      - name: Validate secrets
        run: |
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "Missing TELEGRAM_BOT_TOKEN repository secret" && exit 1)
          test -n "$TELEGRAM_CHAT_ID" || (echo "Missing TELEGRAM_CHAT_ID repository secret" && exit 1)

      - name: Seed out-of-stock state
        if: ${{ env.SEED_OUT_OF_STOCK_URL != '' }}
        run: python -m zarabot seed-state --url "$SEED_OUT_OF_STOCK_URL" --status out_of_stock --title "Transition test"

      - name: Check stock once
        run: |
          if [ "$NOTIFY_CURRENT" = "true" ]; then
            xvfb-run -a python -m zarabot --products products.txt --once --notify-current --headed --fail-on-unknown
          else
            xvfb-run -a python -m zarabot --products products.txt --once --headed --fail-on-unknown
          fi

      - name: Save stock state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: zarabot-state-${{ github.run_id }}
